name: Docker Image Build

on:
  workflow_dispatch:
    inputs:
      tag_version:
        description: Docker image tag (without "v")
        required: true
        type: string
      sdk_version:
        description: Supervisely SDK version override (optional)
        required: false
        default: ""
        type: string

jobs:
  docker-build-and-push:
    uses: supervisely-ecosystem/workflows/.github/workflows/build_image.yml@master
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    with:
      tag_version: ${{ github.event.inputs.tag_version }}
      dockerfile_path: Dockerfile
      image_name: "slyosm"
      sdk_version: ${{ github.event.inputs.sdk_version }}
